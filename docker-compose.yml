services:
  postgres:
    image: postgres:16

    container_name: naporta-db

    restart: always

    ports:
      - '5432:5432'

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: naporta

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
